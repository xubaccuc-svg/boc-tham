<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Bốc thăm chung kết - Đội Trái vs Đội Phải</title></head><body><link rel="preconnect" href="https://fonts.googleapis.com">
<link id="btc-font" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800;900&display=swap" rel="stylesheet">
<style id="btc-style">
  :root{
    --pitch:#0d2818;
    --pitch-2:#123722;
    --line:#2b5c3f;
    --gold:#e8b83a;
    --gold-2:#c99a1f;
    --arg:#74b9e8;
    --arg-dark:#2f6d9e;
    --esp:#d94141;
    --esp-dark:#a02020;
    --paper:#fdf8ec;
    --ink:#101d15;
    --muted:#9dbfa9;
    font-size:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  .btc-app{
    font-family:'Be Vietnam Pro',system-ui,sans-serif;
    background:
      repeating-linear-gradient(90deg, transparent 0 79px, rgba(255,255,255,.025) 79px 158px),
      radial-gradient(1200px 500px at 50% -10%, #1b4a2e 0%, var(--pitch) 60%);
    color:var(--paper);
    min-height:100vh;
    padding:20px 14px 48px;
  }
  .btc-wrap{max-width:520px;margin:0 auto}
  .btc-eyebrow{
    text-align:center;letter-spacing:.28em;font-size:.68rem;font-weight:600;
    color:var(--muted);text-transform:uppercase;margin-bottom:6px;
  }
  h1.btc-title{
    text-align:center;font-weight:900;font-size:1.55rem;line-height:1.2;
    text-transform:uppercase;letter-spacing:.02em;margin-bottom:2px;
  }
  .btc-vs{
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin:10px 0 4px;font-weight:800;font-size:1.05rem;
  }
  .btc-vs .t-arg{color:var(--arg)}
  .btc-vs .t-esp{color:#ff8a8a}
  .btc-vs .vs{
    font-size:.7rem;border:1px solid var(--line);border-radius:999px;
    padding:2px 8px;color:var(--muted);letter-spacing:.15em;
  }
  .btc-sub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:20px}
  .btc-progress{
    text-align:center;font-size:.8rem;color:var(--muted);margin:14px 0 10px;
  }
  .btc-progress b{color:var(--gold)}

  /* ---------- thẻ gia đình / vé ---------- */
  .btc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .ticket{
    position:relative;border-radius:12px;min-height:118px;
    perspective:800px;cursor:pointer;border:none;background:none;
    font-family:inherit;text-align:left;padding:0;
  }
  .ticket:focus-visible .tk-face{outline:3px solid var(--gold);outline-offset:2px}
  .tk-inner{
    position:relative;width:100%;height:118px;
    transform-style:preserve-3d;transition:transform .8s cubic-bezier(.3,1.4,.4,1);
  }
  .ticket.revealed .tk-inner{transform:rotateY(180deg)}
  @media (prefers-reduced-motion: reduce){
    .tk-inner{transition:none}
  }
  .tk-face{
    position:absolute;inset:0;border-radius:12px;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:12px 14px;
  }
  .tk-front{
    background:
      radial-gradient(120px 60px at 85% 10%, rgba(255,255,255,.35), transparent 60%),
      linear-gradient(135deg, var(--gold) 0%, var(--gold-2) 100%);
    color:var(--ink);
    box-shadow:0 6px 16px rgba(0,0,0,.35);
  }
  .tk-front::before,.tk-front::after{
    content:"";position:absolute;top:50%;width:16px;height:16px;border-radius:50%;
    background:var(--pitch);transform:translateY(-50%);
  }
  .tk-front::before{left:-8px}
  .tk-front::after{right:-8px}
  .tk-fam{font-weight:800;font-size:.95rem;line-height:1.25;word-break:break-word}
  .tk-seal{
    align-self:flex-end;font-size:.62rem;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;border:1.5px dashed rgba(16,29,21,.5);
    border-radius:6px;padding:3px 7px;color:rgba(16,29,21,.75);
  }
  .tk-back{
    transform:rotateY(180deg);
    box-shadow:0 6px 16px rgba(0,0,0,.35);
    color:#fff;
  }
  .tk-back.arg{background:linear-gradient(150deg,var(--arg) 0%,var(--arg-dark) 100%)}
  .tk-back.esp{background:linear-gradient(150deg,var(--esp) 0%,var(--esp-dark) 100%)}
  .tk-back .tk-fam{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
  .tk-team{display:flex;align-items:center;gap:8px;font-weight:900;font-size:1.02rem}
  .tk-flag{font-size:1.4rem;line-height:1}

  /* ---------- màn hình thiết lập ---------- */
  .setup-card{
    background:rgba(255,255,255,.05);border:1px solid var(--line);
    border-radius:14px;padding:18px 16px;margin-top:8px;
  }
  .setup-card h2{font-size:1rem;font-weight:800;margin-bottom:4px}
  .setup-card p{font-size:.82rem;color:var(--muted);margin-bottom:14px;line-height:1.5}
  .setup-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .setup-row .num{
    width:22px;height:22px;border-radius:50%;background:var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:.7rem;font-weight:600;flex:none;
  }
  .setup-row input{
    flex:1;background:rgba(0,0,0,.25);border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;color:var(--paper);
    font-family:inherit;font-size:.9rem;
  }
  .setup-row input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .btn{
    display:block;width:100%;border:none;border-radius:10px;
    padding:13px 16px;font-family:inherit;font-weight:800;font-size:.95rem;
    cursor:pointer;margin-top:14px;
  }
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:var(--ink)}
  .btn-gold:active{transform:translateY(1px)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn[disabled]{opacity:.5;cursor:not-allowed}

  /* ---------- khối chia sẻ ---------- */
  .share-card{
    background:rgba(232,184,58,.08);border:1.5px solid var(--gold-2);
    border-radius:14px;padding:16px;margin:16px 0 6px;
  }
  .share-card h3{font-size:.92rem;font-weight:800;color:var(--gold);margin-bottom:6px}
  .share-card p{font-size:.8rem;color:var(--muted);line-height:1.55;margin-bottom:10px}
  .share-code{
    background:rgba(0,0,0,.35);border:1px dashed var(--line);border-radius:8px;
    padding:10px;font-size:.72rem;word-break:break-all;color:var(--paper);
    max-height:96px;overflow:auto;margin-bottom:10px;
    font-family:ui-monospace,Consolas,monospace;
  }
  .share-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .share-btns .btn{margin-top:0;padding:11px 10px;font-size:.85rem}

  /* ---------- ô nhập mã ---------- */
  .code-row{display:flex;gap:8px;margin-top:10px}
  .code-row input{
    flex:1;background:rgba(0,0,0,.25);border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;color:var(--paper);
    font-family:ui-monospace,Consolas,monospace;font-size:.8rem;
  }
  .code-row .btn{width:auto;margin-top:0;padding:10px 16px}

  /* ---------- modal ---------- */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.65);
    display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .modal{
    background:var(--pitch-2);border:1px solid var(--line);border-radius:14px;
    padding:20px 18px;max-width:360px;width:100%;
  }
  .modal h3{font-size:1rem;font-weight:800;margin-bottom:8px}
  .modal p{font-size:.85rem;color:var(--muted);line-height:1.5;margin-bottom:16px}
  .modal .btn{margin-top:8px}

  /* ---------- tổng kết ---------- */
  .summary{
    margin-top:22px;border-radius:14px;overflow:hidden;
    border:1px solid var(--line);
  }
  .summary-head{
    background:rgba(232,184,58,.12);padding:10px 14px;
    font-weight:800;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--gold);text-align:center;
  }
  .summary-cols{display:grid;grid-template-columns:1fr 1fr}
  .summary-col{padding:12px 14px}
  .summary-col+.summary-col{border-left:1px solid var(--line)}
  .summary-col h4{font-size:.85rem;font-weight:800;margin-bottom:8px;display:flex;gap:6px;align-items:center}
  .summary-col.arg h4{color:var(--arg)}
  .summary-col.esp h4{color:#ff8a8a}
  .summary-col li{list-style:none;font-size:.82rem;padding:3px 0;color:var(--paper)}

  .btc-note{
    text-align:center;font-size:.72rem;color:var(--muted);
    margin-top:26px;line-height:1.6;
  }
  .btc-reset{
    background:none;border:none;color:var(--muted);text-decoration:underline;
    font-family:inherit;font-size:.72rem;cursor:pointer;margin-top:8px;
  }
  .btc-error{
    background:rgba(217,65,65,.15);border:1px solid rgba(217,65,65,.5);
    border-radius:10px;padding:10px 12px;font-size:.8rem;margin:12px 0;text-align:center;
  }
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:var(--gold);color:var(--ink);font-weight:700;font-size:.82rem;
    border-radius:999px;padding:9px 18px;z-index:60;
    box-shadow:0 6px 16px rgba(0,0,0,.4);
  }
</style>

  <div class="btc-wrap">

</div>

<script>window.__PRESET_CODE="Xnlowo94wpZYTkw6Lsa8wq7CoxIpcTPDrsODKsOvVitiMm_CjcWTIRRhBQ_Do8ODKsOvVitiMm_CjcWTIRRhBQ9hTSzDr1YrYjJvwo3FkyEUYQUXYcOMLMOvVitiMm_CjcWTIRRhBQtmxJ3huqHCox0rCXlJw4Qjw63Fq8OlSzMuw6UtwqxYVAl5esKPeMOvO0xkGkvDqGDDoVh_B2E_w5A";</script><script id="btc-script">
(function(){
  // Chụp lại mã nguồn gốc của trang NGAY khi tải, trước khi vẽ giao diện,
  // để phục vụ nút "Tải file gửi Zalo" (file độc lập, mở ở đâu cũng chạy)
  var PRISTINE = (function(){
    try{
      var fontEl = document.getElementById("btc-font");
      var styleEl = document.getElementById("btc-style");
      var appEl = document.querySelector(".btc-app");
      var modalEl = document.getElementById("modal-slot");
      var scriptEl = document.getElementById("btc-script");
      if(!styleEl || !appEl || !scriptEl) return null;
      return {
        head: "<!DOCTYPE html>\n<html lang=\"vi\"><head><meta charset=\"utf-8\">"+
              "<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">"+
              "<title>Bốc thăm chung kết - Đội Trái vs Đội Phải</title>"+
              (fontEl ? fontEl.outerHTML : "")+
              styleEl.outerHTML+
              "</head><body>",
        body: appEl.outerHTML + (modalEl ? modalEl.outerHTML : ""),
        script: scriptEl.outerHTML,
        tail: "</body></html>"
      };
    }catch(e){ return null; }
  })();

  var TEAMS = { A: {name:"ĐỘI TRÁI", flag:"🔵", cls:"arg"},
                E: {name:"ĐỘI PHẢI", flag:"🔴", cls:"esp"} };
  var root = document.getElementById("app-root");
  var modalSlot = document.getElementById("modal-slot");
  var resetBtn = document.getElementById("reset-btn");
  var state = null;      // {families:[6], tickets:"AEAEAE..."}
  var revealed = {};     // chỉ trên máy này
  var shareCode = "";

  function esc(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  /* ---------- mã hoá / giải mã (không cần máy chủ) ---------- */
  function b64encodeUnicode(str){
    return btoa(unescape(encodeURIComponent(str)))
      .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  }
  function b64decodeUnicode(str){
    str = str.replace(/-/g,"+").replace(/_/g,"/");
    while(str.length % 4){ str += "="; }
    return decodeURIComponent(escape(atob(str)));
  }
  // XOR nhẹ để mã không đọc được bằng mắt thường
  var XK = [37, 91, 14, 173, 66, 205, 122, 9];
  function xorStr(s){
    var out = "";
    for(var i=0;i<s.length;i++){
      out += String.fromCharCode(s.charCodeAt(i) ^ XK[i % XK.length]);
    }
    return out;
  }
  function encodeState(st){
    var payload = JSON.stringify({f:st.families, t:st.tickets, v:1});
    return b64encodeUnicode(xorStr(payload));
  }
  function decodeState(code){
    try{
      var payload = xorStr(b64decodeUnicode(code.trim()));
      var o = JSON.parse(payload);
      if(!o || o.v!==1) return null;
      if(!Array.isArray(o.f) || o.f.length!==6) return null;
      if(typeof o.t!=="string" || o.t.length!==6) return null;
      var a=0,e=0;
      for(var i=0;i<6;i++){
        if(o.t[i]==="A") a++; else if(o.t[i]==="E") e++; else return null;
      }
      if(a!==3 || e!==3) return null;
      return {families:o.f, tickets:o.t};
    }catch(err){ return null; }
  }

  /* ---------- trộn phiếu bằng ngẫu nhiên mã hoá ---------- */
  function shuffledTickets(){
    var arr = ["A","A","A","E","E","E"];
    for(var i=arr.length-1;i>0;i--){
      var j;
      if(window.crypto && crypto.getRandomValues){
        var buf = new Uint32Array(1);
        crypto.getRandomValues(buf);
        j = buf[0] % (i+1);
      }else{
        j = Math.floor(Math.random()*(i+1));
      }
      var t = arr[i]; arr[i]=arr[j]; arr[j]=t;
    }
    return arr.join("");
  }

  /* ---------- toast ---------- */
  function toast(msg){
    var el = document.createElement("div");
    el.className = "toast";
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function(){ el.remove(); }, 2200);
  }

  /* ---------- màn hình thiết lập ---------- */
  function renderSetup(errMsg){
    var rows = "";
    for(var i=0;i<6;i++){
      rows += '<div class="setup-row"><span class="num">'+(i+1)+'</span>'+
        '<input type="text" maxlength="40" id="fam-'+i+'" placeholder="Tên gia đình '+(i+1)+'" value="Gia đình '+(i+1)+'"></div>';
    }
    root.innerHTML =
      '<div class="setup-card">'+
        '<h2>Bước 1 · Nhập tên 6 gia đình</h2>'+
        '<p>Bấm trộn để gán ngẫu nhiên 6 lá phiếu (3 Argentina, 3 Tây Ban Nha). Kết quả được chốt ngay lập tức và mã hoá vào link chia sẻ — không ai biết trước, không ai đổi được.</p>'+
        (errMsg ? '<div class="btc-error">'+esc(errMsg)+'</div>' : '')+
        rows+
        '<button class="btn btn-gold" id="create-btn">🎲 Trộn phiếu &amp; tạo link chia sẻ</button>'+
      '</div>'+
      '<div class="setup-card">'+
        '<h2>Đã nhận được mã bốc thăm?</h2>'+
        '<p>Nếu gia đình bạn được gửi một đoạn mã (thay vì link), hãy dán vào đây:</p>'+
        '<div class="code-row">'+
          '<input type="text" id="code-input" placeholder="Dán mã bốc thăm vào đây">'+
          '<button class="btn btn-gold" id="code-btn">Mở</button>'+
        '</div>'+
      '</div>';
    resetBtn.style.display = "none";
    document.getElementById("create-btn").addEventListener("click", onCreate);
    document.getElementById("code-btn").addEventListener("click", function(){
      var code = document.getElementById("code-input").value;
      var st = decodeState(code);
      if(!st){ toast("Mã không hợp lệ, kiểm tra lại nhé"); return; }
      state = st; shareCode = code.trim(); revealed = {};
      try{ location.hash = "d="+shareCode; }catch(e){}
      renderMain(false);
    });
  }

  function onCreate(){
    var names = [];
    for(var i=0;i<6;i++){
      var v = document.getElementById("fam-"+i).value.trim();
      if(!v){ renderSetup("Vui lòng nhập đủ tên 6 gia đình."); return; }
      names.push(v);
    }
    var lower = names.map(function(n){return n.toLowerCase();});
    for(var a=0;a<6;a++) for(var b=a+1;b<6;b++){
      if(lower[a]===lower[b]){ renderSetup("Tên gia đình bị trùng: \""+names[a]+"\". Vui lòng đặt tên khác nhau."); return; }
    }
    state = { families:names, tickets:shuffledTickets() };
    shareCode = encodeState(state);
    revealed = {};
    try{ location.hash = "d="+shareCode; }catch(e){}
    renderMain(true);
  }

  /* ---------- giao diện chính ---------- */
  function isPublicUrl(){
    try{
      if(location.protocol !== "https:" && location.protocol !== "http:") return false;
      var h = location.hostname || "";
      if(!h || h==="localhost" || h==="127.0.0.1") return false;
      return true;
    }catch(e){ return false; }
  }
  function buildZaloMessage(){
    return "🏆 BỐC THĂM CHUNG KẾT 🔵 ĐỘI TRÁI vs 🔴 ĐỘI PHẢI 🏆\n"+
      "6 gia đình – 6 lá phiếu (3 phiếu mỗi đội) đã được trộn ngẫu nhiên và niêm phong kín.\n\n"+
      "CÁCH MỞ PHIẾU:\n"+
      "1️⃣ Tải file \"boc-tham-chung-ket.html\" gửi kèm trong nhóm về máy\n"+
      "2️⃣ Mở file bằng trình duyệt (Chrome/Safari) — sẽ thấy 6 lá phiếu vàng\n"+
      "3️⃣ Chạm vào lá phiếu có tên nhà mình để lật, xem nhà mình thuộc đội nào\n\n"+
      "Kết quả đã chốt sẵn trong file — nhà nào mở cũng ra đúng cùng một kết quả, tuyệt đối công bằng, không ai sửa được! ⚽";
  }
  function buildStandaloneHtml(){
    if(!PRISTINE) return null;
    // Gắn sẵn kết quả vào file để người nhận mở ra thấy phiếu ngay
    var preset = '<scr'+'ipt>window.__PRESET_CODE='+JSON.stringify(shareCode)+';</scr'+'ipt>';
    return PRISTINE.head + PRISTINE.body + preset + PRISTINE.script + PRISTINE.tail;
  }
  function downloadStandalone(){
    var html = buildStandaloneHtml();
    if(!html){
      toast("Không tạo được file — hãy dùng phương án sao chép mã");
      return;
    }
    try{
      var blob = new Blob([html], {type:"text/html;charset=utf-8"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "boc-tham-chung-ket.html";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
      toast("Đã tải file 🎉 Gửi file này vào nhóm Zalo");
    }catch(e){
      toast("Trình duyệt chặn tải file — hãy dùng phương án sao chép mã");
    }
  }
  function renderMain(showShareFirst){
    var isPreset = (typeof window.__PRESET_CODE === "string" && !!window.__PRESET_CODE);
    var revealedCount = Object.keys(revealed).length;
    var publicOk = isPublicUrl();
    var shareUrl = "";
    if(publicOk){
      try{ shareUrl = location.href.split("#")[0] + "#d=" + shareCode; }catch(e){}
    }

    var html = "";

    // Khối chia sẻ — chỉ hiện cho người tổ chức, ẩn với người chơi (bản gắn sẵn kết quả)
    if(!isPreset){
    html += '<div class="share-card">'+
      '<h3>📨 Bước 2 · Gửi cho 6 gia đình</h3>'+
      '<p><b>Cách chắc chắn nhất (không cần link):</b> bấm nút vàng để tải về file đã gắn sẵn kết quả, rồi gửi thẳng file đó vào nhóm Zalo. Mỗi nhà tải file về, mở bằng trình duyệt là thấy ngay 6 lá phiếu — chạm vào phiếu nhà mình để lật.</p>'+
      '<button class="btn btn-gold" id="dl-file-btn" style="margin-top:0">⬇️ Tải file gửi Zalo (đã gắn kết quả)</button>'+
      '<button class="btn btn-ghost" id="copy-msg-btn" style="margin-top:10px">Sao chép tin nhắn hướng dẫn</button>'+
      '<p style="margin:14px 0 6px;font-size:.74rem">Phương án dự phòng — mã bốc thăm (dán vào ô "Đã nhận được mã" trên bất kỳ bản trang nào):</p>'+
      '<div class="share-code" id="share-code-box">'+esc(shareCode)+'</div>'+
      '<div class="share-btns">'+
        '<button class="btn btn-ghost" id="copy-code-btn">Sao chép mã</button>'+
        (publicOk
          ? '<button class="btn btn-ghost" id="copy-link-btn">Sao chép link kèm mã</button>'
          : '<button class="btn btn-ghost" disabled title="Cần Publish artifact để có link công khai">Link: cần Publish</button>')+
      '</div>'+
    '</div>';
    } // hết khối chia sẻ (chỉ dành cho người tổ chức)

    html += '<div class="btc-progress">Đã mở <b>'+revealedCount+'/6</b> lá phiếu trên máy này'+
            (revealedCount<6 ? ' · chạm vào phiếu để mở' : ' · đã mở hết!')+'</div>';

    html += '<div class="btc-grid">';
    for(var i=0;i<6;i++){
      var fam = esc(state.families[i]);
      var opened = !!revealed[i];
      var team = TEAMS[state.tickets[i]];
      html += '<button class="ticket'+(opened?' revealed':'')+'" data-idx="'+i+'" aria-label="Phiếu của '+fam+'">'+
        '<div class="tk-inner">'+
          '<div class="tk-face tk-front">'+
            '<div class="tk-fam">'+fam+'</div>'+
            '<div class="tk-seal">Niêm phong ✦ chạm để mở</div>'+
          '</div>'+
          '<div class="tk-face tk-back '+team.cls+'">'+
            '<div class="tk-fam">'+fam+'</div>'+
            '<div class="tk-team"><span class="tk-flag">'+team.flag+'</span>'+team.name+'</div>'+
          '</div>'+
        '</div>'+
      '</button>';
    }
    html += '</div>';

    if(revealedCount>0 && revealedCount<6){
      html += '<button class="btn btn-ghost" id="open-all-btn">Mở tất cả các phiếu còn lại</button>';
    }

    if(revealedCount===6){
      var argFams=[], espFams=[];
      for(var k=0;k<6;k++){
        (state.tickets[k]==="A"?argFams:espFams).push(esc(state.families[k]));
      }
      html += '<div class="summary">'+
        '<div class="summary-head">Kết quả chung cuộc</div>'+
        '<div class="summary-cols">'+
          '<div class="summary-col arg"><h4>🔵 Đội Trái</h4><ul>'+
            argFams.map(function(f){return '<li>• '+f+'</li>';}).join("")+'</ul></div>'+
          '<div class="summary-col esp"><h4>🔴 Đội Phải</h4><ul>'+
            espFams.map(function(f){return '<li>• '+f+'</li>';}).join("")+'</ul></div>'+
        '</div>'+
      '</div>';
    }

    root.innerHTML = html;
    resetBtn.style.display = isPreset ? "none" : "inline";

    var dlBtn = document.getElementById("dl-file-btn");
    if(dlBtn) dlBtn.addEventListener("click", downloadStandalone);
    var msgBtn = document.getElementById("copy-msg-btn");
    if(msgBtn) msgBtn.addEventListener("click", function(){
      copyText(buildZaloMessage(), "Đã sao chép tin nhắn 🎉 Dán vào Zalo nhé");
    });
    var codeBtn = document.getElementById("copy-code-btn");
    if(codeBtn) codeBtn.addEventListener("click", function(){
      copyText(shareCode, "Đã sao chép mã 🎉");
    });
    var linkBtn = document.getElementById("copy-link-btn");
    if(linkBtn){
      linkBtn.addEventListener("click", function(){
        copyText(shareUrl, "Đã sao chép link 🎉");
      });
    }
    var openAll = document.getElementById("open-all-btn");
    if(openAll){
      openAll.addEventListener("click", function(){
        for(var i=0;i<6;i++) revealed[i]=true;
        renderMain(false);
      });
    }
    var tickets = root.querySelectorAll(".ticket");
    for(var t=0;t<tickets.length;t++){
      tickets[t].addEventListener("click", onTicketClick);
    }
  }

  function copyText(text, okMsg){
    function fallback(){
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      var ok = false;
      try{ ok = document.execCommand("copy"); }catch(e){}
      ta.remove();
      toast(ok ? okMsg : "Không sao chép được — hãy bôi đen mã và copy thủ công");
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ toast(okMsg); }, fallback);
    }else{
      fallback();
    }
  }

  function onTicketClick(e){
    var idx = parseInt(e.currentTarget.getAttribute("data-idx"),10);
    if(revealed[idx]) return;
    showConfirm(idx);
  }

  function showConfirm(idx){
    var fam = esc(state.families[idx]);
    modalSlot.innerHTML =
      '<div class="modal-bg" id="modal-bg">'+
        '<div class="modal">'+
          '<h3>Mở phiếu của '+fam+'?</h3>'+
          '<p>Kết quả đã được chốt sẵn từ lúc trộn — mở lúc nào cũng ra đúng đội đó. Chạm mở để lật phiếu.</p>'+
          '<button class="btn btn-gold" id="confirm-open">Mở phiếu 🎫</button>'+
          '<button class="btn btn-ghost" id="cancel-open">Quay lại</button>'+
        '</div>'+
      '</div>';
    document.getElementById("cancel-open").addEventListener("click", closeModal);
    document.getElementById("modal-bg").addEventListener("click", function(ev){
      if(ev.target.id==="modal-bg") closeModal();
    });
    document.getElementById("confirm-open").addEventListener("click", function(){
      closeModal();
      revealed[idx] = true;
      renderMain(false);
    });
  }
  function closeModal(){ modalSlot.innerHTML=""; }

  /* ---------- tạo lại ---------- */
  resetBtn.addEventListener("click", function(){
    var ok = confirm("Tạo bốc thăm mới? Link/mã cũ vẫn dùng được, nhưng trang này sẽ về màn hình nhập tên.");
    if(!ok) return;
    state = null; revealed = {}; shareCode = "";
    try{ location.hash = ""; }catch(e){}
    renderSetup();
  });

  /* ---------- khởi động: ưu tiên mã gắn sẵn trong file, sau đó đọc mã từ link ---------- */
  (function init(){
    if(typeof window.__PRESET_CODE === "string" && window.__PRESET_CODE){
      var pst = decodeState(window.__PRESET_CODE);
      if(pst){
        state = pst; shareCode = window.__PRESET_CODE; revealed = {};
        renderMain(false);
        return;
      }
    }
    var h = "";
    try{ h = location.hash || ""; }catch(e){}
    var m = h.match(/[#&]d=([A-Za-z0-9_\-]+)/);
    if(m){
      var st = decodeState(m[1]);
      if(st){
        state = st; shareCode = m[1]; revealed = {};
        renderMain(false);
        return;
      }
    }
    renderSetup();
  })();
})();
</script>
</body></html>
